name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - run: npm run build

      - name: Check if version already published
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view homebridge-lg-thinqconnect-ac@$VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already on npm, skipping."
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deprecate previous versions
        if: steps.version_check.outputs.already_published == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VERSIONS=$(npm view homebridge-lg-thinqconnect-ac versions --json | node -e "
            const current = '$VERSION';
            const all = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            all.filter(v => v !== current).forEach(v => console.log(v));
          ")
          for v in $VERSIONS; do
            echo "Deprecating $v..."
            npm deprecate homebridge-lg-thinqconnect-ac@$v "Deprecated: please upgrade to v$VERSION"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
