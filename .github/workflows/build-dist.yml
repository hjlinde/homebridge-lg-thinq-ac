name: Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tsconfig.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - run: npm run build
